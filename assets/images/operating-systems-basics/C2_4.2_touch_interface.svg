  <rect x="700" y="286" width="280" height="300" rx="18" fill="#99f6e4"/>
  <text x="840" y="444" text-anchor="middle" fill="#0f172a" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Pantallas de apps</text>
  <rect x="700" y="608" width="280" height="86" rx="16" fill="#0f766e"/>
  <text x="840" y="662" text-anchor="middle" fill="#f8fafc" font-size="24" font-family="Segoe UI, Arial, sans-serif">Gestos / Home</text>

  <line x1="535" y1="230" x2="655" y2="230" stroke="#e2e8f0" stroke-width="4"/>
  <line x1="535" y1="440" x2="655" y2="440" stroke="#e2e8f0" stroke-width="4"/>

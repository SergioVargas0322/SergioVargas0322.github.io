  <text x="600" y="120" text-anchor="middle" fill="#d1fae5" font-size="24" font-family="Segoe UI, Arial, sans-serif">Elementos clave en Android e iOS</text>

  <rect x="180" y="170" width="360" height="560" rx="44" fill="url(#phone)"/>
  <rect x="660" y="170" width="360" height="560" rx="44" fill="url(#phone)"/>

  <rect x="220" y="206" width="280" height="60" rx="14" fill="#0ea5e9"/>

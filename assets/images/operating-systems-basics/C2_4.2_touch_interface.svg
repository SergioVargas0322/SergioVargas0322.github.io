  <text x="600" y="224" text-anchor="middle" fill="#e2e8f0" font-size="20" font-family="Segoe UI, Arial, sans-serif">Notificaciones y ajustes rapidos</text>
  <text x="600" y="434" text-anchor="middle" fill="#e2e8f0" font-size="20" font-family="Segoe UI, Arial, sans-serif">Organizacion tactil del contenido</text>
  <text x="600" y="644" text-anchor="middle" fill="#e2e8f0" font-size="20" font-family="Segoe UI, Arial, sans-serif">Navegacion por botones o gestos</text>

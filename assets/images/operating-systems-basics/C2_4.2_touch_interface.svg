  <rect x="220" y="286" width="280" height="300" rx="18" fill="#93c5fd"/>
  <text x="360" y="444" text-anchor="middle" fill="#0f172a" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Apps y Widgets</text>
  <rect x="220" y="608" width="280" height="86" rx="16" fill="#2563eb"/>
  <text x="360" y="662" text-anchor="middle" fill="#f8fafc" font-size="24" font-family="Segoe UI, Arial, sans-serif">Navegacion</text>

  <rect x="700" y="206" width="280" height="60" rx="14" fill="#14b8a6"/>

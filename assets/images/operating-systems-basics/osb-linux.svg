<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-label="Operating Systems Basics Linux">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22303c"/>
      <stop offset="100%" stop-color="#2f4a5d"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <rect x="90" y="130" width="1020" height="540" rx="18" fill="#0f1820" stroke="#87a2b8" stroke-width="5"/>
  <rect x="120" y="170" width="960" height="430" rx="10" fill="#081218"/>
  <text x="150" y="240" fill="#7de08b" font-size="40" font-family="Consolas, monospace">$ uname -a</text>
  <text x="150" y="300" fill="#d5e4ef" font-size="32" font-family="Consolas, monospace">linux host 6.x generic x86_64 GNU/Linux</text>
  <text x="150" y="370" fill="#7de08b" font-size="40" font-family="Consolas, monospace">$ ls -la /etc</text>
  <text x="150" y="430" fill="#d5e4ef" font-size="32" font-family="Consolas, monospace">drwxr-xr-x root root ...</text>
  <text x="150" y="500" fill="#7de08b" font-size="40" font-family="Consolas, monospace">$ sudo systemctl status ssh</text>
  <text x="120" y="740" fill="#f4f9ff" font-size="52" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Linux Shell and Administration</text>
</svg>

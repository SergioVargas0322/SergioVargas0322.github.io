<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <rect width="1200" height="700" fill="#f8fafc"/>
  <text x="600" y="70" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="44" fill="#0f172a" font-weight="700">
    Hardening Basico de Dispositivos Cisco
  </text>
  <text x="600" y="110" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#334155">
    Controles minimos para proteger switch y router
  </text>

  <rect x="80" y="170" width="330" height="130" rx="16" fill="#dbeafe" stroke="#2563eb" stroke-width="4"/>
  <text x="245" y="225" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="29" fill="#1e3a8a" font-weight="600">Acceso seguro</text>
  <text x="245" y="260" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="21" fill="#1f2937">enable secret, SSH, line vty</text>

  <rect x="435" y="170" width="330" height="130" rx="16" fill="#dcfce7" stroke="#16a34a" stroke-width="4"/>
  <text x="600" y="225" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="29" fill="#166534" font-weight="600">Contrasenas y banner</text>
  <text x="600" y="260" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="21" fill="#1f2937">password policy y aviso legal</text>

  <rect x="790" y="170" width="330" height="130" rx="16" fill="#fef3c7" stroke="#d97706" stroke-width="4"/>
  <text x="955" y="225" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="29" fill="#92400e" font-weight="600">Servicios innecesarios</text>
  <text x="955" y="260" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="21" fill="#1f2937">deshabilitar Telnet y HTTP</text>

  <rect x="120" y="390" width="300" height="130" rx="16" fill="#e0f2fe" stroke="#0284c7" stroke-width="4"/>
  <text x="270" y="445" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="29" fill="#075985" font-weight="600">Seguridad fisica</text>
  <text x="270" y="480" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="21" fill="#1f2937">puertos no usados en shutdown</text>

  <rect x="450" y="390" width="300" height="130" rx="16" fill="#ede9fe" stroke="#7c3aed" stroke-width="4"/>
  <text x="600" y="445" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="29" fill="#5b21b6" font-weight="600">Monitoreo</text>
  <text x="600" y="480" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="21" fill="#1f2937">syslog, NTP y auditoria</text>

  <rect x="780" y="390" width="340" height="130" rx="16" fill="#fee2e2" stroke="#dc2626" stroke-width="4"/>
  <text x="950" y="445" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="29" fill="#991b1b" font-weight="600">Control de cambios</text>
  <text x="950" y="480" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="21" fill="#1f2937">backups y verificacion continua</text>

  <line x1="245" y1="300" x2="270" y2="390" stroke="#475569" stroke-width="4"/>
  <line x1="600" y1="300" x2="600" y2="390" stroke="#475569" stroke-width="4"/>
  <line x1="955" y1="300" x2="950" y2="390" stroke="#475569" stroke-width="4"/>

  <text x="80" y="620" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#334155">
    Objetivo: reducir superficie de ataque y reforzar acceso administrativo desde el primer dia.
  </text>
</svg>

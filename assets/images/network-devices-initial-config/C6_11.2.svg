<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <rect width="1200" height="700" fill="#f8fafc"/>
  <text x="600" y="70" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="44" fill="#0f172a" font-weight="700">
    Ajustes Iniciales de Enrutador
  </text>
  <text x="600" y="110" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#334155">
    Checklist tecnico para activar un router Cisco
  </text>

  <rect x="95" y="180" width="300" height="120" rx="18" fill="#dbeafe" stroke="#2563eb" stroke-width="4"/>
  <text x="245" y="235" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="30" fill="#1e3a8a" font-weight="600">1. Base IOS</text>
  <text x="245" y="270" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="21" fill="#1f2937">hostname, no ip domain-lookup</text>

  <rect x="450" y="180" width="300" height="120" rx="18" fill="#dcfce7" stroke="#16a34a" stroke-width="4"/>
  <text x="600" y="235" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="30" fill="#166534" font-weight="600">2. Interfaces</text>
  <text x="600" y="270" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="21" fill="#1f2937">IP, mascara, descripcion, no shut</text>

  <rect x="805" y="180" width="300" height="120" rx="18" fill="#fef3c7" stroke="#d97706" stroke-width="4"/>
  <text x="955" y="235" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="30" fill="#92400e" font-weight="600">3. Acceso seguro</text>
  <text x="955" y="270" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="21" fill="#1f2937">enable secret y SSH en VTY</text>

  <rect x="190" y="395" width="300" height="120" rx="18" fill="#e0f2fe" stroke="#0284c7" stroke-width="4"/>
  <text x="340" y="450" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="30" fill="#075985" font-weight="600">4. Verificar</text>
  <text x="340" y="485" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="21" fill="#1f2937">show ip int br y show run</text>

  <rect x="550" y="395" width="300" height="120" rx="18" fill="#ede9fe" stroke="#7c3aed" stroke-width="4"/>
  <text x="700" y="450" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="30" fill="#5b21b6" font-weight="600">5. Conectividad</text>
  <text x="700" y="485" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="21" fill="#1f2937">ping local y remota</text>

  <rect x="910" y="395" width="220" height="120" rx="18" fill="#fee2e2" stroke="#dc2626" stroke-width="4"/>
  <text x="1020" y="450" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="30" fill="#991b1b" font-weight="600">6. Persistir</text>
  <text x="1020" y="485" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="21" fill="#1f2937">copy run start</text>

  <line x1="395" y1="240" x2="450" y2="240" stroke="#475569" stroke-width="5"/>
  <polygon points="450,240 436,231 436,249" fill="#475569"/>
  <line x1="750" y1="240" x2="805" y2="240" stroke="#475569" stroke-width="5"/>
  <polygon points="805,240 791,231 791,249" fill="#475569"/>
  <line x1="955" y1="300" x2="955" y2="395" stroke="#475569" stroke-width="5"/>
  <polygon points="955,395 946,380 964,380" fill="#475569"/>
  <line x1="910" y1="455" x2="850" y2="455" stroke="#475569" stroke-width="5"/>
  <polygon points="850,455 865,446 865,464" fill="#475569"/>
  <line x1="550" y1="455" x2="490" y2="455" stroke="#475569" stroke-width="5"/>
  <polygon points="490,455 505,446 505,464" fill="#475569"/>

  <text x="68" y="635" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#334155">
    Nota: habilitar solo servicios requeridos y registrar respaldos de configuracion.
  </text>
</svg>

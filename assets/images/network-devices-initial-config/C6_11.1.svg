<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <rect width="1200" height="700" fill="#f4f7fb"/>
  <text x="600" y="70" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="44" fill="#0f172a" font-weight="700">
    Flujo Basico de Configuracion de Switch
  </text>
  <text x="600" y="110" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#334155">
    Secuencia recomendada para puesta en marcha inicial
  </text>

  <rect x="80" y="180" width="300" height="110" rx="16" fill="#dbeafe" stroke="#2563eb" stroke-width="4"/>
  <text x="230" y="235" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="30" fill="#1e3a8a" font-weight="600">1. Acceso CLI</text>
  <text x="230" y="268" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="21" fill="#1f2937">consola y modo privilegiado</text>

  <rect x="450" y="180" width="300" height="110" rx="16" fill="#dcfce7" stroke="#16a34a" stroke-width="4"/>
  <text x="600" y="235" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="30" fill="#166534" font-weight="600">2. Identidad</text>
  <text x="600" y="268" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="21" fill="#1f2937">hostname y banner</text>

  <rect x="820" y="180" width="300" height="110" rx="16" fill="#fef3c7" stroke="#d97706" stroke-width="4"/>
  <text x="970" y="235" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="30" fill="#92400e" font-weight="600">3. Seguridad</text>
  <text x="970" y="268" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="21" fill="#1f2937">secret, console y vty</text>

  <rect x="170" y="390" width="300" height="110" rx="16" fill="#e0f2fe" stroke="#0284c7" stroke-width="4"/>
  <text x="320" y="445" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="30" fill="#075985" font-weight="600">4. Gestion</text>
  <text x="320" y="478" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="21" fill="#1f2937">IP en SVI y estado</text>

  <rect x="540" y="390" width="300" height="110" rx="16" fill="#ede9fe" stroke="#7c3aed" stroke-width="4"/>
  <text x="690" y="445" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="30" fill="#5b21b6" font-weight="600">5. Verificar</text>
  <text x="690" y="478" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="21" fill="#1f2937">show run y show ip int br</text>

  <rect x="910" y="390" width="230" height="110" rx="16" fill="#fee2e2" stroke="#dc2626" stroke-width="4"/>
  <text x="1025" y="445" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="30" fill="#991b1b" font-weight="600">6. Guardar</text>
  <text x="1025" y="478" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="21" fill="#1f2937">copy run start</text>

  <line x1="380" y1="235" x2="450" y2="235" stroke="#475569" stroke-width="5"/>
  <polygon points="450,235 435,226 435,244" fill="#475569"/>
  <line x1="750" y1="235" x2="820" y2="235" stroke="#475569" stroke-width="5"/>
  <polygon points="820,235 805,226 805,244" fill="#475569"/>

  <line x1="970" y1="290" x2="970" y2="390" stroke="#475569" stroke-width="5"/>
  <polygon points="970,390 961,375 979,375" fill="#475569"/>
  <line x1="910" y1="445" x2="840" y2="445" stroke="#475569" stroke-width="5"/>
  <polygon points="840,445 855,436 855,454" fill="#475569"/>
  <line x1="540" y1="445" x2="470" y2="445" stroke="#475569" stroke-width="5"/>
  <polygon points="470,445 485,436 485,454" fill="#475569"/>

  <text x="70" y="630" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#334155">
    Recomendacion: documentar cambios, usar claves seguras y validar antes de guardar.
  </text>
</svg>
